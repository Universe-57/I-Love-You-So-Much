<!DOCTYPE html>
<html>
<head>
<title>Confession Wall</title>

<style>
body{
  margin:0;
  font-family:Arial;
  color:white;
  text-align:center;
  background: linear-gradient(to bottom, #020024, #090979, #1b3fa0, #4b6cb7);
  min-height:100vh;
  overflow-x: hidden;
}

/* stars background */
body::before{
  content:"";
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background-image:
    radial-gradient(2px 2px white, transparent),
    radial-gradient(1px 1px #ddd, transparent),
    radial-gradient(2px 2px white, transparent);
  background-size:120px 120px,180px 180px,250px 250px;
  opacity:0.7;
  pointer-events:none;
}

.container{
  margin-top:80px;
}

/* text box */
textarea{
  width:80%;
  height:120px;
  border-radius:12px;
  border:none;
  padding:12px;
  font-size:16px;
}

/* star button */
.star-btn{
  margin-top:20px;
  width:110px;
  height:110px;
  background:gold;
  border:none;
  cursor:pointer;
  font-weight:bold;
  clip-path: polygon(
    50% 0%,61% 35%,98% 35%,68% 57%,79% 91%,
    50% 70%,21% 91%,32% 57%,2% 35%,39% 35%
  );
}

.message{
  background:rgba(255,255,255,0.1);
  margin:12px auto;
  width:80%;
  padding:12px;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="container">

<h1>🌙 Anonymous Confession Wall</h1>

<textarea id="confession" placeholder="Write your confession..."></textarea>
<br>
<button class="star-btn" onclick="sendConfession()">SEND</button>

<div id="messages"></div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// 🔹 Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyBu8N9Ou68EdqfuUIfCYTHrZKN45Cczdsw",
  authDomain: "confession-wall-8f338.firebaseapp.com",
  projectId: "confession-wall-8f338",
  storageBucket: "confession-wall-8f338.appspot.com",
  messagingSenderId: "840253038954",
  appId: "1:840253038954:web:79f13bba057546f4d84513",
  measurementId: "G-LMGVLM3W20"
};

// Initialize Firebase
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// Send confession to Firestore
async function sendConfession() {
  let text = document.getElementById("confession").value;
  if (text === "") {
    alert("Write something first!");
    return;
  }

  await addDoc(collection(db, "confessions"), { message: text });

  alert("Confession sent!");
  document.getElementById("confession").value = "";
  loadMessages();
}

// Load all messages from Firestore
async function loadMessages() {
  let wall = document.getElementById("messages");
  wall.innerHTML = "";

  const querySnapshot = await getDocs(collection(db, "confessions"));
  querySnapshot.forEach((doc) => {
    let msg = document.createElement("div");
    msg.className = "message";
    msg.innerText = doc.data().message;
    wall.prepend(msg);
  });
}

// Load messages on page load
loadMessages();
</script>

</body>
</html>
